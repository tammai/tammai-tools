<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Slides</title>

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  FONTS — update the URL below when changing font families   ║
    ╚══════════════════════════════════════════════════════════════╝
    Default: Google Sans (headings) · Space Grotesk (body) · JetBrains Mono (code)
    Replace family names in the URL and in --brand-font-* variables below.
    Google Fonts URL builder: https://fonts.google.com
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ╔══════════════════════════════════════════════════════════════╗
       ║  BRAND CONFIGURATION — edit this section to match your brand ║
       ╚══════════════════════════════════════════════════════════════╝ */
    :root {
      /* Accent color: used for highlights, bullets, borders, CTAs.
         Pick any CSS color that reads well on a dark background.    */
      --brand-accent: #f97316;

      /* Page background: works best as a very dark color.           */
      --brand-bg: #020617;

      /* Fonts: update the Google Fonts <link> above when changing.  */
      --brand-font-main: 'Google Sans', system-ui, sans-serif;
      --brand-font-body: 'Space Grotesk', sans-serif;
      --brand-font-code: 'JetBrains Mono', monospace;
    }
    /* ══════════════════════════════════════════════════════════════ */

    /* ============================================================
       DESIGN TOKENS — Tailwind CSS slate scale
       https://tailwindcss.com/docs/colors
    ============================================================ */
    :root {
      --slate-50:  #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --slate-950: #020617;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--brand-bg);
      color: var(--slate-100);
      font-family: var(--brand-font-main);
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       BACKGROUND DECORATION
    ============================================================ */
    #bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    #bg::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        color-mix(in srgb, var(--brand-accent) 7%, transparent) 0%,
        transparent 70%
      );
      top: -280px;
      right: -220px;
    }
    #bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        color-mix(in srgb, var(--slate-700) 30%, transparent) 0%,
        transparent 70%
      );
      bottom: -180px;
      left: -120px;
    }

    /* ============================================================
       SLIDE SYSTEM
    ============================================================ */
    #deck {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 52px 72px 96px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .slide.exit {
      opacity: 0;
      transform: translateY(-16px);
    }

    /* ============================================================
       SLIDE HEADER
    ============================================================ */
    .slide-header {
      flex-shrink: 0;
      margin-bottom: 40px;
    }

    /* Slide number — small, non-intrusive */
    .slide-num {
      display: block;
      font-family: var(--brand-font-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-accent);
      margin-bottom: 10px;
    }

    .slide-title {
      font-size: 2.9rem;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--slate-50);
    }

    .slide-subtitle {
      margin-top: 10px;
      font-family: var(--brand-font-body);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--slate-400);
      line-height: 1.55;
    }

    /* Accent rule under header */
    .slide-header::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      border-radius: 2px;
      background: var(--brand-accent);
      margin-top: 20px;
    }

    /* ============================================================
       COVER SLIDE VARIANT
    ============================================================ */
    .slide--cover {
      justify-content: center;
    }

    .slide--cover .slide-header {
      margin-bottom: 0;
    }

    .slide--cover .slide-header::after {
      display: none;
    }

    .slide--cover .slide-title {
      font-size: 4.2rem;
    }

    .slide--cover .slide-subtitle {
      font-size: 1.15rem;
      max-width: 500px;
    }

    .cover-meta {
      margin-top: 44px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--brand-font-body);
      font-size: 0.85rem;
      color: var(--slate-500);
      letter-spacing: 0.04em;
    }

    .cover-meta::before {
      content: '';
      width: 36px;
      height: 2px;
      background: var(--brand-accent);
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* ============================================================
       SECTION DIVIDER VARIANT
    ============================================================ */
    .slide--section {
      justify-content: center;
      align-items: flex-start;
    }

    .slide--section .slide-header::after { display: none; }

    .slide--section .section-label {
      display: inline-block;
      font-family: var(--brand-font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--slate-600);
      border: 1px solid var(--slate-700);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 20px;
    }

    .slide--section .slide-title {
      font-size: 3.8rem;
    }

    /* ============================================================
       SLIDE BODY
    ============================================================ */
    .slide-body {
      flex: 1;
      display: flex;
      gap: 0;
      align-items: stretch;
      min-height: 0;
    }

    /* Column */
    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 0 32px;
    }

    .col:first-child { padding-left: 0; }
    .col:last-child  { padding-right: 0; }

    /* Dividers between columns */
    .slide-body.cols-2 .col + .col,
    .slide-body.cols-3 .col + .col {
      border-left: 1px solid var(--slate-800);
    }

    /* Column label */
    .col-label {
      font-family: var(--brand-font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-accent);
      margin-bottom: 20px;
    }

    .col-label.muted {
      color: var(--slate-500);
    }

    /* ============================================================
       CONTENT TYPES
    ============================================================ */

    /* --- Text --- */
    .text {
      font-family: var(--brand-font-body);
      font-size: 1.575rem;
      line-height: 1.75;
      color: var(--slate-300);
    }

    .text p + p { margin-top: 1em; }

    .text strong { color: var(--slate-50);  font-weight: 600; }
    .text em     { color: var(--brand-accent); font-style: normal; }

    /* --- List --- */
    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--brand-font-body);
      font-size: 1.54rem;
      color: var(--slate-300);
      line-height: 1.55;
    }

    .list li::before {
      content: '';
      flex-shrink: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand-accent);
    }

    .list li strong { color: var(--slate-100); font-weight: 600; }

    /* Numbered list variant */
    .list.numbered { counter-reset: item; }
    .list.numbered li::before {
      content: counter(item);
      counter-increment: item;
      background: none;
      width: auto;
      height: auto;
      border-radius: 0;
      font-family: var(--brand-font-body);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--brand-accent);
      min-width: 18px;
    }

    /* --- Callout --- */
    .callout {
      background: color-mix(in srgb, var(--brand-accent) 8%, transparent);
      border-left: 3px solid var(--brand-accent);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      font-family: var(--brand-font-body);
      font-size: 1.5rem;
      color: var(--slate-200);
      line-height: 1.65;
    }

    /* --- Code block --- */
    .code-block {
      background: var(--slate-900);
      border: 1px solid var(--slate-700);
      border-radius: 12px;
      padding: 20px 24px;
      font-family: var(--brand-font-code);
      font-size: 1.26rem;
      line-height: 1.7;
      color: var(--slate-200);
      overflow: hidden;
      flex: 1;
    }

    .code-lang {
      font-family: var(--brand-font-body);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-accent);
      margin-bottom: 12px;
    }

    .code-block .kw  { color: var(--brand-accent); }
    .code-block .str { color: var(--slate-300); }
    .code-block .cmt { color: var(--slate-600); }
    .code-block .fn  { color: var(--slate-100); }

    /* --- Stat --- */
    .stat-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100%;
      gap: 8px;
    }

    .stat-number {
      font-size: 7.5rem;
      font-weight: 700;
      color: var(--brand-accent);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .stat-label {
      font-family: var(--brand-font-body);
      font-size: 1.35rem;
      color: var(--slate-400);
      letter-spacing: 0.06em;
    }

    /* --- Tag group --- */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .tag {
      font-family: var(--brand-font-body);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--slate-700);
      color: var(--slate-300);
      background: color-mix(in srgb, var(--slate-700) 30%, transparent);
    }

    .tag.accent {
      border-color: var(--brand-accent);
      color: var(--brand-accent);
      background: color-mix(in srgb, var(--brand-accent) 10%, transparent);
    }

    /* --- Spacer --- */
    .spacer { flex: 1; }

    /* ============================================================
       WATERMARK — BigIn logo, bottom left
    ============================================================ */
    #watermark {
      position: fixed;
      bottom: 20px;
      left: 40px;
      z-index: 10;
      pointer-events: none;
    }

    #watermark svg,
    #watermark img {
      height: 80px;
      width: auto;
      opacity: 0.35;
    }

    /* ============================================================
       NAVIGATOR — bottom right, vertical, 80px wide
    ============================================================ */
    #navigator {
      position: fixed;
      bottom: 20px;
      right: 40px;
      z-index: 10;
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0.5;
      transition: opacity 0.25s ease;
    }

    #navigator:hover { opacity: 1; }

    .nav-btn {
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: var(--slate-300);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--slate-800);
      color: var(--brand-accent);
    }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .nav-btn svg {
      width: 18px;
      height: 18px;
    }

    .nav-label {
      font-family: var(--brand-font-body);
      font-size: 12px;
      color: var(--slate-500);
      text-align: center;
      user-select: none;
      white-space: nowrap;
    }

    .nav-label .cur {
      color: var(--slate-100);
      font-weight: 600;
    }
  </style>
</head>

<!-- ================================================================
     NAVIGATOR
================================================================ -->
<nav id="navigator" aria-label="Slide navigation">
  <!-- Prev (chevron up) -->
  <button class="nav-btn" id="prevBtn" aria-label="Previous slide" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>
  <!-- Page indicator -->
  <div class="nav-label">
    <span class="cur" id="curPage">1</span>
    <span style="color:var(--slate-700)"> / </span>
    <span id="totPage">7</span>
  </div>
  <!-- Next (chevron down) -->
  <button class="nav-btn" id="nextBtn" aria-label="Next slide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
</nav>

<!-- ================================================================
     NAVIGATION SCRIPT
================================================================ -->
<script>
  const slides  = Array.from(document.querySelectorAll('.slide'));
  const total   = slides.length;
  let   current = 0;

  const prevBtn  = document.getElementById('prevBtn');
  const nextBtn  = document.getElementById('nextBtn');
  const curPage  = document.getElementById('curPage');
  const totPage  = document.getElementById('totPage');

  totPage.textContent = total;

  function goTo(index) {
    if (index < 0 || index >= total) return;
    const outgoing = slides[current];
    outgoing.classList.add('exit');
    outgoing.classList.remove('active');
    // Clean up exit class after transition ends
    outgoing.addEventListener('transitionend', () => outgoing.classList.remove('exit'), { once: true });
    current = index;
    slides[current].classList.add('active');
    curPage.textContent  = current + 1;
    prevBtn.disabled     = current === 0;
    nextBtn.disabled     = current === total - 1;
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (['ArrowRight', 'ArrowDown', ' ', 'PageDown'].includes(e.key)) {
      e.preventDefault(); goTo(current + 1);
    }
    if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) {
      e.preventDefault(); goTo(current - 1);
    }
  });

  // Init state — first slide already has .active in HTML, just sync controls
  curPage.textContent = 1;
  totPage.textContent = total;
  prevBtn.disabled    = true;
  nextBtn.disabled    = total <= 1;
</script>
